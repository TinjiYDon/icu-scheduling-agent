# P0 团队 PostgreSQL（不含 MIMIC 数据；Layer 1 通过 dump 网盘传递后 restore）
#
# 默认 5434，避免与本机 PG16(5432) 及决策库容器冲突
services:
  postgres:
    image: postgres:16
    container_name: icu_scheduling_pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${PG_PORT:-5434}:5432"
    volumes:
      - icu_scheduling_pg_data:/var/lib/postgresql/data
      - ./scripts/init_databases_p0.sql:/docker-entrypoint-initdb.d/01_init_p0.sql:ro
      - ./scripts/docker_init_mock.sh:/docker-entrypoint-initdb.d/02_mock.sh:ro
      - ./scripts/mock_schema_scheduling.sql:/scripts/mock_schema_scheduling.sql:ro
      - ./scripts/mock_schema_decision.sql:/scripts/mock_schema_decision.sql:ro
      - ./dumps:/dumps

volumes:
  icu_scheduling_pg_data:
